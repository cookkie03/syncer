x-dns-hosts: &dns-hosts
  # Docker Desktop on Windows/WSL2 blocks UDP/53 and the ISP DNS
  # (Telecom Italia) hijacks NXDOMAIN. extra_hosts bypasses DNS entirely.
  # Update IPs if they change: resolve via DoH (curl 'https://1.1.1.1/dns-query?name=HOST&type=A' -H 'accept: application/dns-json')
  extra_hosts:
    - "host.docker.internal:host-gateway"
    - "calendar.lucamanca.synology.me:${SYNOLOGY_IP:-79.50.144.75}"
    - "api.notion.com:${NOTION_API_IP:-208.103.161.2}"
    - "api.telegram.org:${TELEGRAM_API_IP:-149.154.166.110}"
    - "www.googleapis.com:${GOOGLEAPIS_IP:-192.178.203.95}"
    - "oauth2.googleapis.com:${GOOGLEAPIS_OAUTH_IP:-142.251.127.95}"
    - "gmail.googleapis.com:${GMAIL_API_IP:-142.250.181.170}"
    - "people.googleapis.com:${PEOPLE_API_IP:-142.251.141.234}"

services:

  # ── vdirsyncer: CalDAV → Google Calendar ──────────────────────────────────
  vdirsyncer:
    build:
      context: ./vdirsyncer
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    image: caldav-sync/vdirsyncer:local
    restart: unless-stopped
    env_file: .env
    <<: *dns-hosts
    volumes:
      - ./vdirsyncer/status:/data/status
      - ./vdirsyncer/token:/data/token
    healthcheck:
      test: ["CMD", "python", "-c", "import vdirsyncer; print('ok')"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── vtodo-notion: CalDAV VTODO ↔ Notion Database ──────────────────────────
  vtodo-notion:
    build:
      context: ./vtodo-notion
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    image: caldav-sync/vtodo-notion:local
    restart: unless-stopped
    env_file: .env
    <<: *dns-hosts
    volumes:
      - ./vtodo-notion/state:/data
      - ./config.yaml:/app/config.yaml:ro
      - ./shared:/shared:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import caldav, notion_client; print('ok')"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── notion-backup: JSON backup via official Notion API ──────────────────────
  notion-backup:
    build:
      context: ./notion-backup
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    image: caldav-sync/notion-backup:local
    restart: unless-stopped
    env_file: .env
    <<: *dns-hosts
    volumes:
      - ./notion-backup/backup:/backup
      - ./vdirsyncer/token:/data/token:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./shared:/shared:ro
    environment:
      - GOOGLE_GMAIL_TOKEN_FILE=/data/token/google_gmail.json
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; print('ok')"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── caldav-backup: backup CalDAV calendars and tasks to ICS ───────────────
  caldav-backup:
    build:
      context: ./caldav-backup
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    image: caldav-sync/caldav-backup:local
    restart: unless-stopped
    env_file: .env
    <<: *dns-hosts
    volumes:
      - ./caldav-backup/backup:/backup
      - ./config.yaml:/app/config.yaml:ro
      - ./shared:/shared:ro
    environment:
      - CALDAV_BACKUP_DIR=/backup
    command: ["--watch", "--interval", "14400"]
    healthcheck:
      test: ["CMD", "python", "-c", "import caldav; print('ok')"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── carddav-google-contacts: Bidirectional Contact Sync ───────────────────
  carddav-google-contacts:
    build:
      context: ./carddav-google-contacts
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    image: caldav-sync/carddav-google-contacts:local
    restart: unless-stopped
    env_file: .env
    <<: *dns-hosts
    volumes:
      - ./carddav-google-contacts/state:/data
      - ./carddav-google-contacts/backup:/data/backup
      - ./vdirsyncer/token:/data/token:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./shared:/shared:ro
    environment:
      - LOG_DIR=/data/logs
      - DB_FILE=/data/sync_contacts.db
      - BACKUP_DIR=/data/backup
      - GOOGLE_CONTACTS_TOKEN_FILE=/data/token/google_contacts.json
    healthcheck:
      test: ["CMD", "python3", "-c", "import googleapiclient, vobject, caldav; print('ok')"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
